<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Threads Growth</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f13;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#e0e0e0;padding:20px}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%, rgba(168,85,247,0.08) 0%, transparent 50%),radial-gradient(circle at 70% 60%, rgba(236,72,153,0.06) 0%, transparent 50%);z-index:-1}
.card{background:#1a1a24;border-radius:20px;padding:48px 40px;width:400px;max-width:100%;box-shadow:0 25px 80px rgba(0,0,0,0.5);border:1px solid #2a2a3a;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#a855f7,#ec4899,transparent);opacity:0.6}
.logo{font-size:22px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#888;font-size:14px;margin-bottom:28px}
.input-group{position:relative;margin-bottom:16px}
.input-group input{width:100%;padding:16px 16px 8px;border-radius:10px;border:1px solid #2a2a3a;background:#12121a;color:#e0e0e0;font-size:15px;outline:none;transition:border 0.2s;padding-top:20px}
.input-group input:focus{border-color:#a855f7}
.input-group label{position:absolute;left:16px;top:18px;font-size:15px;color:#555;pointer-events:none;transition:all 0.2s ease}
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{top:6px;font-size:11px;color:#a855f7}
.input-group input::placeholder{color:transparent}
.submit-btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#a855f7,#ec4899);color:white;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(168,85,247,0.3)}
.submit-btn:active{transform:translateY(0)}
.submit-btn.loading{color:transparent;pointer-events:none}
.submit-btn.loading::after{content:'';position:absolute;top:50%;left:50%;width:20px;height:20px;margin:-10px 0 0 -10px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.success{color:#22c55e;font-size:13px;margin-top:10px;text-align:center;display:none}
.error{color:#ef4444;font-size:13px;margin-top:10px;text-align:center;display:none}
.footer{text-align:center;margin-top:18px;font-size:13px;color:#555}
.footer a{color:#a855f7;text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Threads Growth</div>
  <div class="sub" id="pageSub">Enter your email to reset your password</div>
  <form onsubmit="event.preventDefault(); sendReset();" id="resetForm">
    <div class="input-group">
      <input type="email" id="email" placeholder=" " required autocomplete="email">
      <label for="email">Email</label>
    </div>
    <div id="pwdFields" style="display:none">
      <div class="input-group pwd-wrap">
        <input type="password" id="newPassword" placeholder=" " required minlength="6">
        <label for="newPassword">New password</label>
      </div>
      <div class="input-group pwd-wrap">
        <input type="password" id="confirmPassword" placeholder=" " required minlength="6">
        <label for="confirmPassword">Confirm password</label>
      </div>
    </div>
    <button type="submit" class="submit-btn" id="resetBtn">Send Reset Link</button>
    <div class="success" id="success"></div>
    <div class="error" id="error"></div>
  </form>
  <div class="footer"><a href="/login">Back to sign in</a></div>
</div>
<script>
let resetToken = null;
const params = new URLSearchParams(window.location.search);
if (params.get('token')) {
  resetToken = params.get('token');
  document.getElementById('pageSub').textContent = 'Choose a new password';
  document.getElementById('pwdFields').style.display = 'block';
  document.getElementById('resetBtn').textContent = 'Reset Password';
  document.getElementById('email').parentElement.style.display = 'none';
  document.getElementById('email').removeAttribute('required');
}

async function sendReset() {
  const btn = document.getElementById('resetBtn');
  const errEl = document.getElementById('error');
  const sucEl = document.getElementById('success');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';
  btn.classList.add('loading');

  try {
    if (resetToken) {
      const pwd = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (pwd !== confirm) { errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; btn.classList.remove('loading'); return; }
      const r = await fetch('/api/auth/reset-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: resetToken, password: pwd }) });
      const d = await r.json();
      if (d.ok) { sucEl.textContent = 'Password reset! Redirecting to login...'; sucEl.style.display = 'block'; setTimeout(() => window.location.href = '/login', 1500); }
      else { errEl.textContent = d.error || 'Reset failed'; errEl.style.display = 'block'; }
    } else {
      const email = document.getElementById('email').value;
      const r = await fetch('/api/auth/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
      const d = await r.json();
      if (d.ok) { sucEl.textContent = 'Password reset link sent! Check your email.'; sucEl.style.display = 'block'; document.getElementById('resetForm').style.display = 'none'; }
      else { errEl.textContent = d.error || 'Request failed'; errEl.style.display = 'block'; }
    }
  } catch(e) { errEl.textContent = 'Network error'; errEl.style.display = 'block'; }
  btn.classList.remove('loading');
}
</script>
</body>
</html>
