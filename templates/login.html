<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Threads Growth</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f13;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#e0e0e0;padding:20px}

/*── Background decoration ──*/
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%, rgba(168,85,247,0.08) 0%, transparent 50%),radial-gradient(circle at 70% 60%, rgba(236,72,153,0.06) 0%, transparent 50%);z-index:-1}

.card{background:#1a1a24;border-radius:20px;padding:48px 40px;width:400px;max-width:100%;box-shadow:0 25px 80px rgba(0,0,0,0.5);border:1px solid #2a2a3a;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#a855f7,#ec4899,transparent);opacity:0.6}

.logo{font-size:22px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#888;font-size:14px;margin-bottom:28px}

/*── Input group ──*/
.input-group{position:relative;margin-bottom:16px}
.input-group input{width:100%;padding:16px 16px 8px;border-radius:10px;border:1px solid #2a2a3a;background:#12121a;color:#e0e0e0;font-size:15px;outline:none;transition:border 0.2s;padding-top:20px}
.input-group input:focus{border-color:#a855f7}
.input-group label{position:absolute;left:16px;top:18px;font-size:15px;color:#555;pointer-events:none;transition:all 0.2s ease}
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{top:6px;font-size:11px;color:#a855f7}
.input-group input::placeholder{color:transparent}

/*── Password toggle ──*/
.pwd-wrap{position:relative}
.pwd-wrap input{padding-right:44px}
.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:18px;padding:4px;transition:color 0.2s}
.pwd-toggle:hover{color:#a855f7}

/*── Submit ──*/
.submit-btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#a855f7,#ec4899);color:white;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(168,85,247,0.3)}
.submit-btn:active{transform:translateY(0)}
.submit-btn.loading{color:transparent;pointer-events:none}
.submit-btn.loading::after{content:'';position:absolute;top:50%;left:50%;width:20px;height:20px;margin:-10px 0 0 -10px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error{color:#ef4444;font-size:13px;margin-top:10px;text-align:center;display:none}
.footer{text-align:center;margin-top:18px;font-size:13px;color:#555}
.footer a{color:#a855f7;text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}
.demo-note{margin-top:12px;padding:10px;border-radius:8px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.15);font-size:12px;color:#888;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Threads Growth</div>
  <div class="sub">Sign in to manage your accounts</div>
  <form onsubmit="event.preventDefault(); login();">
    <div class="input-group">
      <input type="email" id="email" placeholder=" " required autocomplete="email">
      <label for="email">Email</label>
    </div>
    <div class="input-group pwd-wrap">
      <input type="password" id="password" placeholder=" " required>
      <label for="password">Password</label>
      <button type="button" class="pwd-toggle" onclick="togglePwd()" id="pwdEye">👁️</button>
    </div>
    <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
    <div class="error" id="error"></div>
  </form>
  <div class="footer">No account? <a href="/signup">Sign up free</a> · <a href="/forgot-password" style="color:#888">Forgot password?</a></div>
  <div class="demo-note">Demo: <strong>test@test.com</strong> / <strong>test123</strong></div>
</div>
<script>
function togglePwd(){
  const p=document.getElementById('password');
  const e=document.getElementById('pwdEye');
  if(p.type==='password'){p.type='text';e.textContent='🙈'}else{p.type='password';e.textContent='👁️'}
}
async function login(){
  const btn=document.getElementById('loginBtn');
  btn.classList.add('loading');
  document.getElementById('error').style.display='none';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
    const d=await r.json();
    if(d.ok){window.location.href='/';return}
    const el=document.getElementById('error');
    if(d.unverified){
      el.innerHTML='Please verify your email first. <a href="#" onclick="resendVerif(\''+d.email+'\')" style="color:#a855f7">Resend verification</a>';
      el.style.display='block';
    }else{
      el.textContent=d.error||'Login failed';
      el.style.display='block';
    }
  }catch(e){const el=document.getElementById('error');el.textContent='Network error';el.style.display='block'}
  btn.classList.remove('loading');
}
async function resendVerif(email){
  const el=document.getElementById('error');
  el.innerHTML='Sending verification...';
  await fetch('/api/auth/resend-verification',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
  el.innerHTML='Verification email sent! Check your inbox.';
}
</script>
</body>
</html>
