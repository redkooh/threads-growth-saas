<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Threads Growth</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f13;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#e0e0e0;padding:20px}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 70% 30%, rgba(168,85,247,0.08) 0%, transparent 50%),radial-gradient(circle at 30% 70%, rgba(236,72,153,0.06) 0%, transparent 50%);z-index:-1}

.card{background:#1a1a24;border-radius:20px;padding:48px 40px;width:440px;max-width:100%;box-shadow:0 25px 80px rgba(0,0,0,0.5);border:1px solid #2a2a3a;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#a855f7,#ec4899,transparent);opacity:0.6}

.logo{font-size:22px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#888;font-size:14px;margin-bottom:20px}

.input-group{position:relative;margin-bottom:14px}
.input-group input{width:100%;padding:16px 16px 8px;border-radius:10px;border:1px solid #2a2a3a;background:#12121a;color:#e0e0e0;font-size:15px;outline:none;transition:border 0.2s;padding-top:20px}
.input-group input:focus{border-color:#a855f7}
.input-group label{position:absolute;left:16px;top:18px;font-size:15px;color:#555;pointer-events:none;transition:all 0.2s ease}
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{top:6px;font-size:11px;color:#a855f7}
.input-group input::placeholder{color:transparent}

/*── Password strength ──*/
.pwd-strength{height:3px;border-radius:2px;margin:-8px 0 12px;background:#2a2a3a;overflow:hidden;transition:all 0.3s}
.pwd-strength-bar{height:100%;width:0;border-radius:2px;transition:all 0.3s ease}
.pwd-strength-bar.weak{width:33%;background:#ef4444}
.pwd-strength-bar.medium{width:66%;background:#f59e0b}
.pwd-strength-bar.strong{width:100%;background:#22c55e}

/*── Plan selector ──*/
.plans{display:flex;gap:8px;margin:16px 0 8px}
.plan-opt{flex:1;padding:14px 10px;border-radius:12px;border:1px solid #2a2a3a;text-align:center;cursor:pointer;transition:all 0.2s;background:#12121a;position:relative}
.plan-opt:hover{border-color:#3a3a4a}
.plan-opt.selected{border-color:#a855f7;background:rgba(168,85,247,0.1);box-shadow:0 0 0 1px #a855f7}
.plan-opt .pname{font-size:13px;font-weight:600}
.plan-opt.selected .pname{color:#a855f7}
.plan-opt .pprice{font-size:11px;color:#888;margin-top:2px}
.plan-opt .pbadge{position:absolute;top:-8px;right:50%;transform:translateX(50%);background:linear-gradient(135deg,#a855f7,#ec4899);padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600;color:white;white-space:nowrap}
.plan-opt input{display:none}

/*── Submit ──*/
.submit-btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#a855f7,#ec4899);color:white;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;margin-top:8px}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(168,85,247,0.3)}
.submit-btn:active{transform:translateY(0)}
.submit-btn.loading{color:transparent;pointer-events:none}
.submit-btn.loading::after{content:'';position:absolute;top:50%;left:50%;width:20px;height:20px;margin:-10px 0 0 -10px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error{color:#ef4444;font-size:13px;margin-top:8px;text-align:center;display:none}
.footer{text-align:center;margin-top:16px;font-size:13px;color:#555}
.footer a{color:#a855f7;text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Threads Growth</div>
  <div class="sub">Start growing — free trial, no credit card</div>
  <form onsubmit="event.preventDefault(); signup();">
    <div class="input-group">
      <input type="text" id="name" placeholder=" " autocomplete="name">
      <label for="name">Your name</label>
    </div>
    <div class="input-group">
      <input type="email" id="email" placeholder=" " required autocomplete="email">
      <label for="email">Email</label>
    </div>
    <div class="input-group pwd-wrap">
      <input type="password" id="password" placeholder=" " required oninput="checkPwdStrength(this.value)">
      <label for="password">Password</label>
    </div>
    <div class="pwd-strength"><div class="pwd-strength-bar" id="pwdBar"></div></div>

    <div style="font-size:13px;color:#888;margin-bottom:4px">Choose your plan</div>
    <div class="plans" id="planSelector">
      <label class="plan-opt selected" onclick="selectPlan('starter',this)">
        <input type="radio" name="plan" value="starter" checked>
        <div class="pname">Starter</div>
        <div class="pprice">$19/mo</div>
      </label>
      <label class="plan-opt" onclick="selectPlan('growth',this)">
        <input type="radio" name="plan" value="growth">
        <div class="pbadge">Popular</div>
        <div class="pname">Growth</div>
        <div class="pprice">$49/mo</div>
      </label>
      <label class="plan-opt" onclick="selectPlan('agency',this)">
        <input type="radio" name="plan" value="agency">
        <div class="pname">Agency</div>
        <div class="pprice">$149/mo</div>
      </label>
    </div>

    <button type="submit" class="submit-btn" id="signupBtn">Create Account</button>
    <div class="error" id="error"></div>
  </form>
  <div class="footer">Already have an account? <a href="/login">Sign in</a></div>
</div>
<script>
function selectPlan(val, el){
  document.querySelectorAll('#planSelector .plan-opt').forEach(l=>l.classList.remove('selected'));
  el.classList.add('selected');
  document.querySelector('#planSelector input[value="'+val+'"]').checked=true;
}
function checkPwdStrength(v){
  const bar=document.getElementById('pwdBar');
  bar.className='pwd-strength-bar';
  if(!v){bar.style.width='0';return}
  let score=0;
  if(v.length>=6)score++;
  if(v.length>=10)score++;
  if(/[A-Z]/.test(v))score++;
  if(/[0-9]/.test(v))score++;
  if(/[^A-Za-z0-9]/.test(v))score++;
  if(score<=1)bar.className='pwd-strength-bar weak';
  else if(score<=3)bar.className='pwd-strength-bar medium';
  else bar.className='pwd-strength-bar strong';
}
async function signup(){
  const btn=document.getElementById('signupBtn');
  btn.classList.add('loading');
  document.getElementById('error').style.display='none';
  try{
    const r=await fetch('/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('name').value,email:document.getElementById('email').value,password:document.getElementById('password').value})});
    const d=await r.json();
    if(d.ok){window.location.href='/';return}
    const el=document.getElementById('error');el.textContent=d.error||'Signup failed';el.style.display='block';
  }catch(e){const el=document.getElementById('error');el.textContent='Network error';el.style.display='block'}
  btn.classList.remove('loading');
}
</script>
</body>
</html>
