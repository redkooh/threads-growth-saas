<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Payment Successful — Threads Growth</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f13;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#e0e0e0;padding:20px}
.card{background:#1a1a24;border-radius:20px;padding:48px 40px;width:420px;max-width:100%;box-shadow:0 25px 80px rgba(0,0,0,0.5);border:1px solid #2a2a3a;text-align:center}
.icon{font-size:56px;margin-bottom:16px}
.title{font-size:22px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#22c55e,#16a34a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.msg{color:#888;font-size:14px;line-height:1.6;margin-bottom:24px}
.btn{display:inline-block;padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#a855f7,#ec4899);color:white;text-decoration:none;font-weight:600;font-size:15px;transition:all 0.2s}
.btn:hover{transform:translateY(-2px);opacity:0.95}
.sub{color:#555;font-size:12px;margin-top:16px}
.sub a{color:#a855f7;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <div class="title">Payment Successful!</div>
  <div class="msg">Your subscription is now active.<br>Your accounts will keep growing — no action needed.</div>
  <a href="/" class="btn">Go to Dashboard →</a>
  <div class="sub">Need help? <a href="mailto:growpilotgpt@gmail.com">Email us</a></div>
</div>
<script>setTimeout(() => window.location.href = '/', 5000);</script>
</body>
</html>
